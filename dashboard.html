<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>삼우에프엔지 교육센터</title>
  <meta name="theme-color" content="#1a237e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<!-- ===================== 상단 헤더 ===================== -->
<header class="site-header">
  <div class="header-left">
    <div class="header-logo">
      <div class="logo-shield">
        <svg viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2 L36 8 L36 24 Q36 36 20 42 Q4 36 4 24 L4 8 Z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
          <text x="20" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Arial">SW</text>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-title">삼우에프엔지 교육센터</span>
        <span class="logo-greeting" id="header-greeting">안녕하세요, 관리자님</span>
      </div>
    </div>
  </div>
  <div class="header-right">
    <button class="hdr-icon-btn" title="알림" id="notif-btn">
      <i class="fas fa-bell"></i>
      <span class="hdr-badge" id="notif-count">3</span>
    </button>
    <button class="hdr-icon-btn" title="내 정보">
      <i class="fas fa-user"></i>
    </button>
    <button class="hdr-logout-btn" onclick="handleLogout()">
      <i class="fas fa-sign-out-alt"></i>
      <span>로그아웃</span>
    </button>
  </div>
</header>

<!-- ===================== 상단 탭 네비게이션 ===================== -->
<nav class="tab-nav" id="tab-nav">
  <div class="tab-nav-inner">
    <button class="tab-item active" data-tab="main">
      <i class="fas fa-home"></i><span>메인</span>
    </button>
    <button class="tab-item highlight" data-tab="newcomer">
      <i class="fas fa-user-plus"></i><span>신규 입사자</span>
    </button>
    <button class="tab-item" data-tab="appliance">
      <i class="fas fa-tv"></i><span>가전 안전</span>
    </button>
    <button class="tab-item" data-tab="aircon">
      <i class="fas fa-wind"></i><span>에어컨 안전</span>
    </button>
    <button class="tab-item" data-tab="warehouse">
      <i class="fas fa-warehouse"></i><span>창고 안전</span>
    </button>
    <button class="tab-item" data-tab="regulation">
      <i class="fas fa-clipboard-list"></i><span>안전 규정</span>
    </button>
    <button class="tab-item" data-tab="major-accident">
      <i class="fas fa-exclamation-triangle"></i><span>중대재해알림</span>
    </button>
    <button class="tab-item" data-tab="violation">
      <i class="fas fa-comment-slash"></i><span>안전미준수사례</span>
    </button>
    <button class="tab-item" data-tab="admin">
      <i class="fas fa-user-cog"></i><span>관리자메뉴</span>
    </button>
  </div>
</nav>

<!-- ===================== 본문 영역 ===================== -->
<div class="body-wrap">

  <!-- 왼쪽 사이드패널 -->
  <aside class="side-panel">
    <p class="side-panel-label" id="side-label">메인</p>
    <button class="btn-write" id="btn-write" onclick="openWriteModal()">
      <i class="fas fa-plus"></i> 게시물 작성
    </button>
    <div class="post-list" id="post-list">
      <!-- JS 렌더링 -->
    </div>
  </aside>

  <!-- 오른쪽 콘텐츠 뷰어 -->
  <main class="content-view" id="content-view">
    <!-- 초기: 선택 안내 -->
    <div class="empty-guide" id="empty-guide">
      <div class="empty-guide-icon">
        <i class="far fa-comment-dots"></i>
      </div>
      <p>게시물을 선택해주세요.</p>
    </div>

    <!-- 게시물 상세 -->
    <div class="post-detail hidden" id="post-detail">
      <div class="post-detail-header">
        <h2 id="detail-title"></h2>
        <div class="detail-meta" id="detail-meta"></div>
      </div>
      <div class="post-detail-body" id="detail-body"></div>
    </div>
  </main>

</div>

<!-- ===================== 게시물 작성 모달 ===================== -->
<div class="modal-overlay hidden" id="write-modal">
  <div class="modal-box write-modal-box">
    <div class="modal-header">
      <h3>게시물 작성</h3>
      <button class="modal-x-btn" onclick="closeWriteModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body-area">
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="write-title" class="write-input" placeholder="제목을 입력하세요" />
      </div>
      <div class="form-row">
        <label>카테고리</label>
        <select id="write-category" class="write-input">
          <option value="main">메인</option>
          <option value="newcomer">신규 입사자</option>
          <option value="appliance">가전 안전</option>
          <option value="aircon">에어컨 안전</option>
          <option value="warehouse">창고 안전</option>
          <option value="regulation">안전 규정</option>
          <option value="major-accident">중대재해알림</option>
          <option value="violation">안전미준수사례</option>
        </select>
      </div>
      <div class="form-row">
        <label>내용</label>
        <textarea id="write-content" class="write-textarea" placeholder="내용을 입력하세요"></textarea>
      </div>
      <div class="form-row">
        <label>영상 URL <span style="color:#94a3b8;font-weight:400">(선택)</span></label>
        <input type="text" id="write-video" class="write-input" placeholder="YouTube 링크를 입력하세요 (선택사항)" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeWriteModal()">취소</button>
      <button class="btn-save" onclick="savePost()">저장</button>
    </div>
  </div>
</div>

<!-- 알림 드롭다운 -->
<div class="notif-dropdown hidden" id="notif-dropdown">
  <div class="notif-header">
    <span>알림</span>
    <button onclick="clearNotifications()" style="font-size:0.75rem;color:#3b82f6">모두 읽음</button>
  </div>
  <ul class="notif-list" id="notif-list"></ul>
</div>

<!-- 토스트 -->
<div class="toast hidden" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
