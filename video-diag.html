<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>동영상 첨부 진단</title>
<style>
  body { font-family: 'Pretendard', sans-serif; padding: 24px; background: #0f172a; color: #e2e8f0; max-width: 820px; margin: 0 auto; }
  h2  { color: #60a5fa; margin-bottom: 4px; }
  .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }
  .card { background: #1e293b; border-radius: 12px; padding: 18px 20px; margin: 14px 0; }
  .card h3 { font-size: 0.9rem; color: #93c5fd; margin: 0 0 10px; }
  .ok   { color: #4ade80; font-weight: 700; }
  .err  { color: #f87171; font-weight: 700; }
  .warn { color: #facc15; font-weight: 700; }
  .info { color: #94a3b8; }
  .line { padding: 4px 0; border-bottom: 1px solid #0f172a22; font-size: 0.83rem; }
  pre  { background: #0f172a; border-radius: 8px; padding: 12px; font-size: 0.75rem; overflow-x: auto; color: #7dd3fc; white-space: pre-wrap; word-break: break-all; }
  video { width: 100%; max-width: 480px; border-radius: 8px; background: #000; display: block; margin-top: 10px; }
  button { padding: 8px 18px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; margin: 6px 4px 0 0; }
  button:hover { background: #2563eb; }
  .tag-input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 0.85rem; box-sizing: border-box; margin-bottom: 10px; }
</style>
</head>
<body>
<h2>🔬 동영상 첨부 진단 도구</h2>
<p class="sub">Supabase에 저장된 게시물의 동영상 URL 구조와 재생 가능 여부를 확인합니다.</p>

<!-- ① 브라우저 코덱 지원 -->
<div class="card" id="codec-out">
  <h3>① 이 브라우저의 코덱 지원 현황</h3>
  <div id="codec-list">확인 중...</div>
</div>

<!-- ② Supabase 게시물 목록 -->
<div class="card">
  <h3>② Supabase 게시물에서 동영상 첨부 목록 조회</h3>
  <button onclick="loadPosts()">게시물 불러오기</button>
  <div id="posts-out" style="margin-top:12px;"></div>
</div>

<!-- ③ URL 직접 테스트 -->
<div class="card">
  <h3>③ URL 직접 재생 테스트</h3>
  <input type="text" class="tag-input" id="test-url" placeholder="동영상 URL 붙여넣기 (storageURL)..." />
  <button onclick="testURL()">재생 테스트</button>
  <div id="url-out"></div>
</div>

<script>
const SB_URL  = 'https://omuchkxgzjtyhzadjozp.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tdWNoa3hnemp0eWh6YWRqb3pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjkzOTgsImV4cCI6MjA5Njk0NTM5OH0.gVKIt79FdqmeHGwqzdFTLFAhG_OjqQurOYSb5v1FCII';

// ── ① 코덱 지원 확인 ──
(function checkCodecs() {
  const tv = document.createElement('video');
  const tests = [
    ['H.264 (AVC)',       'video/mp4; codecs="avc1.42E01E"'],
    ['H.265 (HEVC) hvc1','video/mp4; codecs="hvc1"'],
    ['H.265 (HEVC) hev1','video/mp4; codecs="hev1"'],
    ['video/mp4 기본',   'video/mp4'],
    ['video/quicktime',  'video/quicktime'],
    ['WebM VP9',         'video/webm; codecs="vp9"'],
  ];
  const el = document.getElementById('codec-list');
  el.innerHTML = tests.map(([label, type]) => {
    const r = tv.canPlayType(type);
    const cls = r==='probably'?'ok':r==='maybe'?'warn':'err';
    const icon = r==='probably'?'✅':r==='maybe'?'⚠️':'❌';
    return `<div class="line"><span class="${cls}">${icon} ${label}</span> → <span class="info">"${r}"</span></div>`;
  }).join('');
})();

// ── ② 게시물 조회 ──
async function loadPosts() {
  const out = document.getElementById('posts-out');
  out.innerHTML = '<span class="info">로딩 중...</span>';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/posts?select=id,title,category,videos&order=created_at.desc&limit=30`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length === 0) {
      out.innerHTML = '<span class="warn">게시물이 없습니다.</span>'; return;
    }

    // videos 필드가 있는 게시물만 필터
    const withVid = rows.filter(r => {
      let vids = r.videos;
      if (typeof vids === 'string') { try { vids = JSON.parse(vids); } catch(e){ vids=[]; } }
      return Array.isArray(vids) && vids.length > 0;
    });

    if (withVid.length === 0) {
      out.innerHTML = `<span class="warn">동영상이 첨부된 게시물이 없습니다.</span><br>
        <span class="info" style="font-size:0.8rem;">전체 ${rows.length}개 게시물 확인됨 — 모두 videos 배열이 비어있음</span>`;
      return;
    }

    let html = `<span class="ok">동영상 첨부 게시물 ${withVid.length}개 발견</span><br><br>`;
    withVid.forEach(r => {
      let vids = r.videos;
      if (typeof vids === 'string') { try { vids = JSON.parse(vids); } catch(e){ vids=[]; } }
      html += `<div style="margin-bottom:16px;padding:12px;background:#0f172a;border-radius:8px;">`;
      html += `<div class="line"><b style="color:#f0abfc;">[${r.category}]</b> ${r.title} <span class="info" style="font-size:0.75rem;">(id: ${r.id})</span></div>`;
      vids.forEach((v, i) => {
        const url = v.storageURL || v.blobURL || '';
        const urlType = v.storageURL ? '✅ storageURL' : v.blobURL ? '⚠️ blobURL(구형)' : '❌ URL 없음';
        html += `<div class="line" style="margin-top:6px;">
          동영상 ${i+1}: <span class="${v.storageURL?'ok':v.blobURL?'warn':'err'}">${urlType}</span>
          &nbsp;|&nbsp; 파일명: <span class="info">${v.name||'(없음)'}</span>
          &nbsp;|&nbsp; 크기: <span class="info">${v.size ? (v.size/1024/1024).toFixed(1)+'MB' : '(없음)'}</span>
        </div>`;
        if (url && v.storageURL) {
          html += `<div style="font-size:0.72rem;color:#4ade80;padding:2px 0;word-break:break-all;">${url}</div>`;
          html += `<button onclick="testURL('${url}')">이 URL 재생 테스트</button>`;
        } else if (v.blobURL) {
          html += `<div style="font-size:0.72rem;color:#facc15;padding:2px 0;">blobURL은 새로고침 후 무효 — 영상을 다시 업로드해야 합니다.</div>`;
        }
        html += `<details style="margin-top:4px;"><summary style="font-size:0.75rem;color:#64748b;cursor:pointer;">원본 JSON</summary><pre>${JSON.stringify(v, null, 2)}</pre></details>`;
      });
      html += `</div>`;
    });
    out.innerHTML = html;
  } catch(e) {
    out.innerHTML = `<span class="err">오류: ${e.message}</span>`;
  }
}

// ── ③ URL 직접 테스트 ──
async function testURL(url) {
  if (!url) url = document.getElementById('test-url').value.trim();
  if (!url) { alert('URL을 입력하세요'); return; }

  const out = document.getElementById('url-out');
  out.innerHTML = '<span class="info">테스트 중...</span>';

  let html = '';

  // HEAD 요청
  try {
    const r = await fetch(url, { method: 'HEAD' });
    html += `<div class="line">HTTP: <span class="${r.ok?'ok':'err'}">${r.status} ${r.statusText}</span></div>`;
    html += `<div class="line">Content-Type: <span class="info">${r.headers.get('content-type')||'없음'}</span></div>`;
    const ar = r.headers.get('accept-ranges');
    html += `<div class="line">Accept-Ranges: <span class="${ar?'ok':'warn'}">${ar||'없음 (시크 불가 — 재생 안 될 수 있음)'}</span></div>`;
    const ao = r.headers.get('access-control-allow-origin');
    html += `<div class="line">CORS(Access-Control-Allow-Origin): <span class="${ao?'ok':'warn'}">${ao||'없음'}</span></div>`;
  } catch(e) {
    html += `<div class="line"><span class="err">HEAD 실패: ${e.message}</span></div>`;
  }

  // video 태그 테스트
  html += `<div style="margin-top:10px;" id="vid-wrap-inner"></div>`;
  out.innerHTML = html;

  const wrap = document.getElementById('vid-wrap-inner');
  const vid = document.createElement('video');
  vid.controls = true; vid.playsInline = true; vid.preload = 'metadata';
  vid.style.width = '100%'; vid.style.maxWidth = '480px';
  vid.style.background = '#000'; vid.style.borderRadius = '8px';

  const logEl = document.createElement('div');
  logEl.style.marginTop = '8px';

  function addLog(msg, type='info') {
    const d = document.createElement('div');
    d.className = `line ${type}`;
    d.textContent = msg;
    logEl.appendChild(d);
  }

  vid.addEventListener('loadstart',      () => addLog('▶ loadstart'));
  vid.addEventListener('durationchange', () => addLog(`▶ durationchange: ${vid.duration?.toFixed(2)}초`, 'ok'));
  vid.addEventListener('loadedmetadata', () => addLog(`✅ loadedmetadata: ${vid.videoWidth}×${vid.videoHeight}`, 'ok'));
  vid.addEventListener('loadeddata',     () => addLog('✅ loadeddata', 'ok'));
  vid.addEventListener('canplay',        () => addLog('✅ canplay — 재생 가능!', 'ok'));
  vid.addEventListener('error', () => {
    const code = vid.error?.code;
    const msgs = {1:'ABORTED',2:'NETWORK',3:'DECODE(코덱 불일치)',4:'SRC_NOT_SUPPORTED(포맷/코덱 미지원)'};
    addLog(`❌ error: ${msgs[code]||code}`, 'err');
    if (code===3||code===4) addLog('→ HEVC(H.265) 가능성 높음. H.264 MP4로 변환 필요.', 'err');
  }, true);

  const src_el = document.createElement('source');
  src_el.src  = url;
  src_el.type = 'video/mp4';
  vid.appendChild(src_el);
  vid.load();

  wrap.appendChild(vid);
  wrap.appendChild(logEl);
}
</script>
</body>
</html>
